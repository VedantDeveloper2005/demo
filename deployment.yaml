apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: hello
        image: miniprodev.azurecr.io/examiq:v6
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
